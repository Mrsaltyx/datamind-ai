services:
  ollama:
    image: ollama/ollama:latest
    container_name: datamind-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    # Auto-pull Gemma 4 E4B on first start
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 5
        ollama pull gemma4:e4b
        wait

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      - OLLAMA_MODEL=gemma4:e4b
    volumes:
      - ./backend:/app/backend
      - ./agent:/app/agent
      - ./utils:/app/utils
      - ./prompts:/app/prompts
      - ./models:/app/models
      - datamind-data:/app/data
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  datamind-data:
  ollama-models:
